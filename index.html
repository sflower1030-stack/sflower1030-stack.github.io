<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아베크</title>
    <style>
        /* 폰트 및 기본 설정 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --primary-color: #00B4A3; 
            --bg-color: #f4f6f8;      
            --text-main: #222;
            --text-sub: #777;
        }
        
        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-y: scroll;
        }

        /* 상단 네비게이션 바 */
        header {
            background-color: white;
            border-bottom: 1px solid #eaeaea;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .logo {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }
        nav {
            display: flex;
            gap: 40px;
        }
        nav a {
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: color 0.2s;
        }
        nav a:hover, nav a.active {
            color: var(--primary-color);
        }

        /* 메인 컨텐츠 영역 */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            min-height: 60vh;
        }

        /* 섹션 전환 애니메이션 */
        .section {
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .section.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 홈 화면 배너 */
        .hero-banner {
            display: flex;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            overflow: hidden;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .hero-text {
            flex: 1;
            padding: 60px 50px;
            min-width: 300px;
        }
        .hero-badge {
            background-color: #f0f0f0;
            color: #555;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
        .hero-text h1 {
            font-size: 42px;
            line-height: 1.3;
            margin: 0 0 20px 0;
            font-weight: 800;
        }
        .hero-text h1 span {
            color: var(--primary-color);
        }
        .hero-text p {
            color: var(--text-sub);
            font-size: 16px;
            line-height: 1.6;
        }
        .hero-image {
            flex: 1;
            background-color: var(--primary-color);
            min-height: 350px;
            position: relative;
        }
        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 공지사항 바 */
        .notice-bar {
            background-color: #333;
            color: white;
            border-radius: 12px;
            padding: 15px 30px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .notice-badge {
            background-color: var(--primary-color);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
        }

        /* 카드 스타일 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
        }
        .card h2 {
            margin-top: 0;
            font-size: 28px;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        /* ⭐️ 친구별 개인 사진첩 그리드 스타일 ⭐️ */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .album-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .album-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .album-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .album-name {
            font-size: 20px;
            font-weight: 700;
            margin: 0 0 5px 0;
            color: var(--text-main);
        }
        .album-desc {
            font-size: 13px;
            color: var(--text-sub);
            margin-bottom: 20px;
        }
        .album-btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            text-decoration: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        .album-btn:hover {
            background-color: #009688;
        }

        /* 푸터 */
        footer {
            background-color: #2b2b2b;
            color: #999;
            padding: 40px 20px;
            margin-top: 60px;
        }
        .footer-inner {
            max-width: 1100px;
            margin: 0 auto;
            font-size: 13px;
            line-height: 1.6;
        }
        .footer-inner strong {
            color: white;
            font-size: 18px;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-inner">
            <div class="logo">OUR HIDEOUT</div>
            <nav>
                <a class="nav-link active" onclick="showSection('home', this)">홈</a>
                <a class="nav-link" onclick="showSection('board', this)">방명록</a>
                <a class="nav-link" onclick="showSection('gallery', this)">사진첩</a>
            </nav>

    </header>

                    <p>우리들만의 프라이빗한 아지트입니다.<br>자유롭게 소통하고 일상을 맘껏 공유해주세요.</p>
                </div>
                <div class="hero-image">
                    <img src="pic1.jpg" alt="메인 이미지" onerror="this.src='https://images.unsplash.com/photo-1529156069898-49953eb1b5ce?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'">
                </div>
            </div>
            
            <div class="notice-bar">
                <span class="notice-badge">공지사항</span>
                <span>친구들 각자의 개인 사진첩 메뉴가 추가되었습니다! 자유롭게 업로드해주세요.</span>
            </div>
        </div>

        <div id="board" class="section">
            <div class="card">
                <h2>📝 방명록</h2>
                <div id="HCB_comment_box">방명록을 불러오는 중입니다...</div>

                <script type="text/javascript" id="hcb"> /**/ </script>
            </div>
        </div>

        <div id="gallery" class="section">
            <div
